services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: yas-jenkins
    user: root
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - yas-network

volumes:
  jenkins_home:

networks:
  yas-network:
    external: true

apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: opentelemetry
spec:
  mode: deployment
  image: otel/opentelemetry-collector-contrib:latest
  ports:
    - name: loki
      port: 3500
      protocol: TCP
      targetPort: 3500
  config: |
    {{ toYaml .Values.opentelemetryCollectorConfig | nindent 4 }}
jenkins:
  systemMessage: "YAS Jenkins Automation - Configuration as Code (JCasC)"

jobs:
  - script: >
      pipelineJob('developer_build') {
        description('Pipeline triển khai tự động các service dựa theo tham số tag của nhà phát triển.')
        parameters {
          stringParam('NAMESPACE', 'dev', 'K8s Namespace triển khai (Ví dụ: dev, staging, qa)')
          booleanParam('DRY_RUN', false, 'Chạy mô phỏng (Dry Run) trước. Bỏ check để deploy THỰC TẾ lên K8s.')
          
          stringParam('TAG_cart', 'latest', 'Commit ID / Tag cho cart')
          stringParam('TAG_customer', 'latest', 'Commit ID / Tag cho customer')
          stringParam('TAG_delivery', 'latest', 'Commit ID / Tag cho delivery')
          stringParam('TAG_inventory', 'latest', 'Commit ID / Tag cho inventory')
          stringParam('TAG_location', 'latest', 'Commit ID / Tag cho location')
          stringParam('TAG_media', 'latest', 'Commit ID / Tag cho media')
          stringParam('TAG_order', 'latest', 'Commit ID / Tag cho order')
          stringParam('TAG_payment', 'latest', 'Commit ID / Tag cho payment')
          stringParam('TAG_payment_paypal', 'latest', 'Commit ID / Tag cho payment-paypal')
          stringParam('TAG_product', 'latest', 'Commit ID / Tag cho product')
          stringParam('TAG_promotion', 'latest', 'Commit ID / Tag cho promotion')
          stringParam('TAG_rating', 'latest', 'Commit ID / Tag cho rating')
          stringParam('TAG_search', 'latest', 'Commit ID / Tag cho search')
          stringParam('TAG_tax', 'latest', 'Commit ID / Tag cho tax')
          stringParam('TAG_recommendation', 'latest', 'Commit ID / Tag cho recommendation')
          stringParam('TAG_webhook', 'latest', 'Commit ID / Tag cho webhook')
          stringParam('TAG_sampledata', 'latest', 'Commit ID / Tag cho sampledata')
          
          stringParam('TAG_backoffice_bff', 'latest', 'Commit ID / Tag cho backoffice-bff')
          stringParam('TAG_storefront_bff', 'latest', 'Commit ID / Tag cho storefront-bff')
          stringParam('TAG_backoffice_ui', 'latest', 'Commit ID / Tag cho backoffice-ui (Frontend)')
          stringParam('TAG_storefront_ui', 'latest', 'Commit ID / Tag cho storefront-ui (Frontend)')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/chubedan4605/another_yas2.git')
                  credentials('github-credentials')
                }
                branch('main')
              }
            }
            scriptPath('Jenkinsfile-developer-build')
          }
        }
      }
      
      pipelineJob('developer_cleanup') {
        description('Xóa toàn bộ Helm releases của developer_build khỏi namespace trên K8s.')
        parameters {
          stringParam('NAMESPACE', 'dev', 'Namespace cần dọn dẹp (xóa toàn bộ Helm releases)')
          booleanParam('DRY_RUN', true, 'Chạy thử trước. Bỏ check để xóa THẬT.')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/chubedan4605/another_yas2.git')
                  credentials('github-credentials')
                }
                branch('main')
              }
            }
            scriptPath('Jenkinsfile-developer-cleanup')
          }
        }
      }

      pipelineJob('auto_deploy_dev') {
        description('Tự động build/push Docker image và deploy vào namespace dev khi main thay đổi.')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/chubedan4605/another_yas2.git')
                  credentials('github-credentials')
                }
                branch('main')
              }
            }
            scriptPath('Jenkinsfile-auto-deploy-dev')
          }
        }
        triggers {
          scm('H/5 * * * *')
        }
      }

      pipelineJob('release_tag_deploy') {
        description('Phát hiện release tag vX.Y.Z, build image theo tag, push Docker Hub và deploy vào staging.')
        parameters {
          stringParam('RELEASE_TAG', '', 'Tag phiên bản release, ví dụ: v1.0.0')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/chubedan4605/another_yas2.git')
                  credentials('github-credentials')
                }
                branch('main')
              }
            }
            scriptPath('Jenkinsfile-release-tag')
          }
        }
      }
